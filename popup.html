<!doctype html>
<html lang="ja">
  <head>
    <!-- ●文書の基本メタ情報を設定する -->
    <meta charset="UTF-8" /> <!-- 文字エンコーディングをUTF-8に固定 -->
    <!-- meta charset: 文字化け防止のため文字コードを定義する -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- モバイル表示時の拡大縮小を制御 -->
    <!-- meta viewport: 画面幅に合わせた表示倍率を設定する -->
    <title>画像保存</title> <!-- ブラウザ上のページタイトルを設定 -->
    <!-- title: ポップアップ画面のタイトル文字列を定義する -->
    <style>
      /* ●ポップアップ全体のレイアウトを定義する */
      body {
        margin: 0; /* ブラウザ既定の外側余白を打ち消す */
        /* margin: 要素外側の余白を指定するプロパティ */
        padding: 12px; /* 内側余白を確保して詰まりを防ぐ */
        /* padding: 要素内側の余白を指定するプロパティ */
        width: 280px; /* ポップアップ横幅を固定する */
        /* width: 要素の横幅を指定するプロパティ */
        font-family: sans-serif; /* 可読性重視の基本フォントを適用 */
        /* font-family: 表示フォントの種類を指定するプロパティ */
      }

      /* ●見出しの文字サイズと間隔を調整する */
      h1 {
        font-size: 14px; /* 見出し文字サイズを小さめに統一 */
        /* font-size: 文字サイズを指定するプロパティ */
        margin: 0 0 10px; /* 下側のみ余白を付けて要素間を分離 */
        /* margin: 上右下左の外側余白を一括指定するプロパティ */
      }

      /* ●メイン操作ボタンの見た目を定義する */
      button {
        width: 100%; /* 親要素幅いっぱいに表示する */
        /* width: 要素の横幅を指定するプロパティ */
        padding: 10px; /* クリックしやすい内側余白を確保する */
        /* padding: 要素内側の余白を指定するプロパティ */
        border: none; /* 既定のボーダー線を非表示にする */
        /* border: 枠線の太さ・種類・色を指定するプロパティ */
        border-radius: 6px; /* 角を丸めて視認性を上げる */
        /* border-radius: 角丸半径を指定するプロパティ */
        background: #1a73e8; /* 操作ボタンの背景色を設定する */
        /* background: 背景色や背景画像を指定するプロパティ */
        color: #fff; /* ボタン文字を白で表示する */
        /* color: 文字色を指定するプロパティ */
        font-size: 14px; /* ボタン文字サイズを統一する */
        /* font-size: 文字サイズを指定するプロパティ */
        cursor: pointer; /* ホバー時にクリック可能であることを示す */
        /* cursor: マウスカーソル形状を指定するプロパティ */
      }

      /* ●ボタン無効時の視覚状態を定義する */
      button:disabled {
        opacity: 0.6; /* 半透明化して無効状態を視覚化する */
        /* opacity: 不透明度を指定するプロパティ */
        cursor: not-allowed; /* 操作不可カーソルを表示する */
        /* cursor: マウスカーソル形状を指定するプロパティ */
      }

      /* ●進捗・結果・エラーの表示領域を整える */
      #status {
        margin-top: 10px; /* ボタンとの間に余白を作る */
        /* margin-top: 上側外側余白を指定するプロパティ */
        font-size: 12px; /* ステータス文字を本文より小さく表示する */
        /* font-size: 文字サイズを指定するプロパティ */
        line-height: 1.4; /* 複数行メッセージの行間を確保する */
        /* line-height: 行の高さを指定するプロパティ */
        white-space: pre-wrap; /* 改行を維持しつつ折り返して表示する */
        /* white-space: 空白と改行の扱いを指定するプロパティ */
      }
    </style>
  </head>
  <body>
    <!-- ●ポップアップの主要UI要素を配置する -->
    <h1>ページ内画像を保存</h1> <!-- 画面の用途を示す見出し -->
    <!-- h1: ポップアップの機能タイトルを表示する見出し要素 -->
    <button id="saveBtn">画像を保存</button> <!-- クリックで保存処理を開始する -->
    <!-- button#saveBtn: popup.js の click ハンドラに紐づく操作ボタン -->
    <div id="status">待機中</div> <!-- 初期状態と進捗結果を表示する -->
    <!-- div#status: 実行中メッセージや成功/失敗件数を表示する領域 -->

    <!-- ●ポップアップの動作ロジックを読み込む -->
    <script src="popup.js"></script> <!-- ボタン操作と状態更新の処理を有効化する -->
    <!-- script[src="popup.js"]: UIイベント処理を提供するスクリプト読み込み -->
  </body>
</html>
